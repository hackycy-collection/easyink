name: Publish

on:
  push:
    tags:
      - '**'
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
          scope: '@easyink'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Each published package must be manually published once, then configured on npmjs.com
      # with this repository and workflow file as its Trusted Publisher. NODE_AUTH_TOKEN is
      # intentionally omitted so npm authenticates through GitHub OIDC.
      - name: Publish to npm
        run: pnpm changeset:publish
        env:
          NPM_CONFIG_ACCESS: public
          NPM_CONFIG_PROVENANCE: true
